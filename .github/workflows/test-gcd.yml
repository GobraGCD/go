name: Test of extendedGCD

on:
  push: # run this workflow on every push
  pull_request: # run this workflow on every pull_request
  merge_group: # run this workflow on every PR in the merge queue

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up bootstrap Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run bigmod tests with local toolchain
        run: ./run_with_local_toolchain.sh -v
        working-directory: src/crypto/internal/fips140/bigmod
        env:
          GOROOT_BOOTSTRAP: ${{ env.GOROOT }}
